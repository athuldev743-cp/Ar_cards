<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joker Card AR</title>
    <link rel="icon" href="data:,">

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <!-- MindAR A-Frame (UMD build, no imports) -->
    <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background:#000; }
      .hint {
        position: fixed; left: 12px; top: 12px; z-index: 10;
        background: rgba(0,0,0,0.6); color:#fff;
        padding: 10px 12px; border-radius: 12px;
        font-family: system-ui; font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="hint">Point camera at the Joker card</div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
    >
      <a-assets>
        <a-asset-item id="jokerModel" src="./joker.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- targetIndex 0 = first image in targets.mind -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#jokerModel"
          position="0 0 0"
          rotation="0 180 0"
          scale="0.35 0.35 0.35"
        ></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
