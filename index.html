<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Joker Card AR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div id="ui">
        <button id="startBtn" class="btn primary">Start AR</button>
        <button id="stopBtn" class="btn danger" style="display:none;">Back</button>
        <div id="status" class="pill">Ready. Tap “Start AR”.</div>
        <button class="btn primary" onclick="window.location.reload()">Refresh</button>
    </div>

    <div id="overlay">
        <div id="overlayCard">
            <h1>Joker Card AR</h1>
            <p>Allow camera permission, then point at the Joker card.</p>
            <button id="startBtn2" class="btn primary" style="width:100%;">Start AR</button>
        </div>
    </div>

   <a-scene
    id="scene"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; colorManagement: true; antialias: true;"
    loading-screen="enabled: false"
    visible="false"
>
   <a-entity
        id="mindarSystem"
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
    >

    <a-assets>
        <a-asset-item id="jokerModel" src="joker.glb"></a-asset-item>
    </a-assets>

    <a-camera id="cam" position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-gltf-model
            id="joker"
            src="#jokerModel"
            position="0 0 0"
            rotation="0 0 0" 
            scale="0.35 0.35 0.35"
            visible="false"
           
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
        ></a-gltf-model>
    </a-entity>
</a-scene>
    <script src="script.js"></script>
</body>
</html>
