<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joker Card AR</title>
    <link rel="icon" href="data:,">

    <!-- 1) three -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <!-- 2) gltf loader (non-module version) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- 3) mindar (non-module version) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background:#000; }
      #ar { position: fixed; inset: 0; width: 100%; height: 100%; }
      .hud {
        position: fixed; left: 12px; right: 12px; top: 12px;
        display: flex; gap: 10px; align-items: center; z-index: 20;
        font-family: system-ui;
      }
      .pill {
        background: rgba(0,0,0,0.6); color: #fff;
        padding: 10px 12px; border-radius: 12px; font-size: 14px;
      }
      #startBtn {
        border: 0; border-radius: 12px; padding: 10px 14px;
        font-size: 14px; cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="hud">
      <button id="startBtn">Start AR</button>
      <div class="pill" id="status">Ready</div>
    </div>
    <div id="ar"></div>

    <script>
      const statusEl = document.getElementById("status");
      const btn = document.getElementById("startBtn");
      const setStatus = (m) => { statusEl.textContent = m; console.log(m); };

      async function ensureCameraPermission() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });
        stream.getTracks().forEach(t => t.stop());
      }

      async function startAR() {
        try {
          // quick sanity check
          console.log("THREE:", window.THREE);
          console.log("MINDAR:", window.MINDAR);

          if (!window.MINDAR?.IMAGE?.MindARThree) {
            setStatus("MindAR not loaded (CDN blocked or script error).");
            return;
          }

          if (!window.isSecureContext) {
            setStatus("Not HTTPS — camera blocked.");
            return;
          }

          if (!navigator.mediaDevices?.getUserMedia) {
            setStatus("getUserMedia not available in this browser.");
            return;
          }

          setStatus("Requesting camera permission...");
          await ensureCameraPermission();

          setStatus("Starting MindAR...");
          const mindarThree = new window.MINDAR.IMAGE.MindARThree({
            container: document.querySelector("#ar"),
            imageTargetSrc: "./targets.mind",
            maxTrack: 1
          });

          const { renderer, scene, camera } = mindarThree;

          scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
          const dir = new THREE.DirectionalLight(0xffffff, 0.8);
          dir.position.set(1, 2, 1);
          scene.add(dir);

          const anchor = mindarThree.addAnchor(0);

          const loader = new THREE.GLTFLoader();
          setStatus("Loading joker.glb...");
          loader.load("./joker.glb", (gltf) => {
            const joker = gltf.scene;
            joker.scale.set(0.35, 0.35, 0.35);
            joker.position.set(0, 0, 0);
            joker.rotation.set(0, Math.PI, 0);

            joker.visible = false;
            anchor.onTargetFound = () => { joker.visible = true; setStatus("Target found ✅"); };
            anchor.onTargetLost  = () => { joker.visible = false; setStatus("Target lost"); };

            anchor.group.add(joker);
            setStatus("Point at Joker card");
          }, undefined, (err) => {
            console.error(err);
            setStatus("Failed to load joker.glb (404/path issue).");
          });

          await mindarThree.start();
          renderer.setAnimationLoop(() => renderer.render(scene, camera));

        } catch (e) {
          console.error(e);
          setStatus("AR failed: " + (e?.message || e));
        }
      }

      btn.addEventListener("click", () => {
        btn.disabled = true;
        btn.textContent = "Starting...";
        startAR();
      });
    </script>
  </body>
</html>
