<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joker Card AR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <div class="container">
        <a-scene
            id="scene"
            mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;"
            color-space="sRGB"
            renderer="colorManagement: true; antialias: true;"
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: false"
            loading-screen="enabled: false"
            embedded
        >
            <a-assets>
                <a-asset-item id="jokerModel" src="joker.glb"></a-asset-item>
            </a-assets>

            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            <a-entity id="target0" mindar-image-target="targetIndex: 0">
                <a-gltf-model
                    id="joker"
                    src="#jokerModel"
                    position="0 0.15 0"
                    rotation="0 0 0"
                    scale="0.35 0.35 0.35"
                    visible="false"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"
                ></a-gltf-model>
            </a-entity>
        </a-scene>
    </div>

    <div id="ui">
        <div id="status" class="pill">Loading...</div>
        <button class="btn" onclick="window.location.reload()">Refresh</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
