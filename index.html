<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Joker Card AR</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <div id="ui">
      <button id="startBtn" class="btn primary">Start AR</button>
      <button id="stopBtn" class="btn danger" style="display:none;">Back</button>
      <div id="status" class="pill">Ready. Tap “Start AR”.</div>
    </div>

    <div id="overlay">
      <div id="overlayCard">
        <h1>Joker Card AR</h1>
        <p>Tap <b>Start AR</b>, allow camera permission, then point the camera at the Joker card.</p>
        <ul id="tips">
          <li>Use a <b>sharp, high-contrast</b> card image.</li>
          <li>Avoid <b>glossy reflections</b> for better tracking.</li>
          <li>Keep the card well-lit and steady.</li>
        </ul>
        <button id="startBtn2" class="btn primary" style="width:100%;">Start AR</button>
      </div>
    </div>

    <a-scene
      id="scene"
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      visible="false"
    >
      <a-entity
        id="mindarSystem"
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; uiScanning: no; uiLoading: no; autoStart: false;"
      ></a-entity>

      <a-assets>
        <a-asset-item id="jokerModel" src="./joker.glb"></a-asset-item>
      </a-assets>

      <a-camera
        id="cam"
        position="0 0 0"
        look-controls="enabled: false"
      ></a-camera>

      <a-entity light="type: hemisphere; intensity: 1.2; color: #ffffff; groundColor: #444444"></a-entity>
      <a-entity light="type: directional; intensity: 0.8" position="1 2 1"></a-entity>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-gltf-model
          id="joker"
          src="#jokerModel"
          position="0 0 0"
          rotation="0 180 0"
          scale="0.35 0.35 0.35"
          visible="false"
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
